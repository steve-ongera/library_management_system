<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="UniLibrary — University Library Management System" />
    <meta name="theme-color" content="#0f2338" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Google Fonts: Playfair Display + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons v1.11 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <title>UniLibrary — University Library Management System</title>

    <style>
      /* Prevent flash of unstyled content */
      html {
        background-color: #f4f6f9;
      }

      /* Loading spinner shown before React mounts */
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        gap: 16px;
        font-family: 'DM Sans', system-ui, sans-serif;
        color: #718096;
      }

      #root-loader .loader-icon {
        font-size: 48px;
        animation: pulse 1.4s ease-in-out infinite;
      }

      #root-loader .loader-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #c8922a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      #root-loader p {
        font-size: 14px;
        margin: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.92); }
      }

      /* Hide loader once React has mounted */
      #root:not(:empty) ~ #root-loader,
      #root:not(:empty) + #root-loader {
        display: none;
      }
    </style>
  </head>

  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Shown only while React bundle is loading -->
    <div id="root-loader">
      <div class="loader-icon">📚</div>
      <div class="loader-spinner"></div>
      <p>Loading UniLibrary…</p>
    </div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
